name: Whisper
options:
  bundleIdPrefix: com.janstrouhal
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Whisper Dev"

targets:
  Whisper:
    type: application
    platform: macOS
    sources:
      - path: Whisper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.janstrouhal.Whisper
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: Whisper/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Whisper/Resources/Whisper.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
